name: Discover Tests 

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Run scraper in container
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ahmedmonte --password-stdin
          docker run --rm \
            -e GMK=${{ secrets.GMK }} \
            -e SU=${{ secrets.SU }} \
            -e SK=${{ secrets.SK }} \
            -e DBP=${{ secrets.DBP }} \
            -e DWU=${{ secrets.DWU }} \
            -e ENRICH_BATCH_SIZE=${{ secrets.ENRICH_BATCH_SIZE }} \
            -e API_DELAY_SECONDS=${{ secrets.API_DELAY_SECONDS }} \
            -e ENRICH_DAILY_QUOTA=${{ secrets.ENRICH_DAILY_QUOTA }} \
            ghcr.io/ahmedmonte/scraper:latest \
            python -m src.scripts.run_discover
